name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PDF verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Check formatting
        run: |
          files="$(gofmt -l $(find . -name '*.go'))"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test -count=1 ./...

      - name: Build CLI
        run: go build -o /tmp/fiscal-renderer-bfrep ./cmd/bfrep
